<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexUp Tech Group</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0A0D14] text-[#E2E8F0] font-sans">
    <section class="relative pt-24 pb-20 text-center max-w-7xl mx-auto px-6">
        <div class="inline-flex items-center space-x-2 bg-[#1E293B]/50 border border-[#334155]/60 rounded-full px-3 py-1 text-xs font-mono text-[#00F5D4] mb-6">
            <span>STABLE RELEASE v1.0.4 // PRODUCTION READY</span>
        </div>
        <h1 class="text-4xl font-extrabold tracking-tight text-white leading-none mb-6">
            We Bridge The Gap Between <br>
            <span class="bg-gradient-to-r from-[#00F5D4] via-[#00B4D8] to-[#9845FF] bg-clip-text text-transparent">Complex Engineering & Execution</span>
        </h1>
        <p class="text-md text-[#94A3B8] max-w-2xl mx-auto mb-10 italic border-l-2 border-[#1E293B] pl-4">
            No marketing fluff. We engineer robust, production-ready multi-agent systems and secure software infrastructure.
        </p>
    </section>

    <section class="py-12 max-w-xl mx-auto px-6">
        <div class="bg-[#0C111C] border border-[#1E293B] rounded-3xl p-6 shadow-2xl">
            <h2 class="text-xl font-bold text-white mb-6 text-center">Initialize Your Architecture</h2>
            <form action="https://api.web3forms.com/submit" method="POST" class="space-y-4">
                <input type="hidden" name="access_key" value="YOUR_KEY_HERE">
                <div>
                    <label class="block text-xs font-mono text-[#64748B] uppercase mb-1">Corporate Identity / Name</label>
                    <input type="text" name="name" class="w-full bg-[#0A0D14] border border-[#1E293B] rounded-lg px-4 py-2 text-sm text-white focus:outline-none focus:border-[#00F5D4]" required>
                </div>
                <div>
                    <label class="block text-xs font-mono text-[#64748B] uppercase mb-1">Secure Communications Access</label>
                    <input type="email" name="email" placeholder="ops@company.com" class="w-full bg-[#0A0D14] border border-[#1E293B] rounded-lg px-4 py-2 text-sm text-white focus:outline-none focus:border-[#00F5D4]" required>
                </div>
                <div>
                    <label class="block text-xs font-mono text-[#64748B] uppercase mb-1">System Scope Details</label>
                    <textarea name="details" rows="4" class="w-full bg-[#0A0D14] border border-[#1E293B] rounded-lg px-4 py-2 text-sm text-white focus:outline-none focus:border-[#00F5D4] resize-none" required></textarea>
                </div>
                <button type="submit" class="w-full py-3 font-semibold text-[#0A0D14] bg-[#00F5D4] rounded-lg text-sm">Transmit Requirements</button>
            </form>
        </div>
    </section>

    <script>lucide.createIcons();</script>
</body>
</html>
